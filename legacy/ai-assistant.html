<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Java I/O AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2463 0%, #1e3f8a 50%, #3e64af 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .api-config {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px;
            background: #f0f6ff;
            border-bottom: 1px solid #cce0ff;
        }

        .api-config input {
            padding: 10px 15px;
            border: 1px solid #cce0ff;
            border-radius: 8px;
            font-size: 0.9em;
            min-width: 300px;
        }

        .api-config button {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .api-config button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.3);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 10px 15px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .role-btn {
            padding: 8px 18px;
            border: 2px solid #cce0ff;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .role-btn.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .role-btn:hover {
            border-color: #0066cc;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.5;
        }

        .message.user {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.assistant {
            background: #f0f6ff;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.assistant code {
            background: #e0e6ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
        }

        .message.assistant pre {
            background: #e0e6ff;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #0066cc;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        .input-area {
            padding: 15px;
            background: #f8fafc;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            padding: 15px;
            border: 1px solid #cce0ff;
            border-radius: 15px;
            resize: none;
            font-size: 1em;
            font-family: inherit;
            min-height: 50px;
            max-height: 150px;
            overflow-y: auto;
        }

        .input-area button {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.3);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #0066cc;
            border: 2px solid #0066cc;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #0066cc;
            color: white;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">← 返回游戏</button>

    <div class="container">
        <div class="header">
            <h1>🤖 Java I/O AI 助手</h1>
            <p>有问题？随时问我！我可以帮你解答 Java I/O 相关知识、生成代码、创建题目。</p>
        </div>

        <div class="api-config">
            <input type="password" id="apiKeyInput" placeholder="请输入 DeepSeek API 密钥" maxlength="100">
            <button onclick="saveApiKey()">保存密钥</button>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="general" onclick="selectRole('general')">💬 普通问答</button>
            <button class="role-btn" data-role="code" onclick="selectRole('code')">💻 代码生成</button>
            <button class="role-btn" data-role="question" onclick="selectRole('question')">📝 题目生成</button>
            <button class="role-btn" data-role="ioExpert" onclick="selectRole('ioExpert')">🔧 I/O 专家</button>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <textarea id="messageInput" placeholder="输入你的问题..." onkeydown="handleKeyDown(event)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <span>发送</span>
                <span>➤</span>
            </button>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="deepseek-service.js"></script>
    <script>
        let currentRole = 'general';
        const service = window.deepSeekService;

        // 加载保存的 API 密钥
        const savedKey = service.getSavedApiKey();
        if (savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
        }

        function goBack() {
            window.location.href = 'java-io-game.html';
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (apiKey) {
                service.setApiKey(apiKey);
                alert('API 密钥已保存！');
            }
        }

        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!message) return;

            // 检查 API 密钥
            if (!service.hasApiKey()) {
                alert('请先设置 DeepSeek API 密钥！');
                return;
            }

            input.value = '';
            sendBtn.disabled = true;

            // 添加用户消息
            addMessage(message, 'user');

            // 添加打字指示器
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await service.sendMessage(message, currentRole);
                typingIndicator.remove();
                addMessage(response, 'assistant');
            } catch (error) {
                typingIndicator.remove();
                addMessage(`❌ 出错了：${error.message}`, 'assistant');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(content, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            // 格式化代码块
            content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            messageDiv.innerHTML = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 欢迎消息
        addMessage('你好！我是 Java I/O AI 助手，有什么我可以帮你的吗？\n\n我可以：\n- 💬 解答 Java I/O 相关问题\n- 💻 生成 Java 代码\n- 📝 生成测验题目\n- 🔧 提供专业的 I/O 知识指导', 'assistant');
    </script>
</body>
</html>
